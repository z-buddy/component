<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z-BUDDY HOMIEZ - iTunes Search</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Michroma&display=swap"
        rel="stylesheet"
    >

    <style>
        :root {
            --bg: #000000;
            --panel: #050505;
            --line: #1f1f1f;
            --line-strong: #333333;
            --text: #f2f2f2;
            --muted: #8b8b8b;
            --accent: #00f3ff;
            --control-bg: #111111;
            --soft-accent: rgba(0, 243, 255, 0.045);
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            min-height: 100%;
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: var(--text);
            font-family: Inter, sans-serif, "Helvetica Neue", Arial;
        }

        body {
            padding: 20px;
            overflow-x: hidden;
        }

        button,
        input {
            font-family: Inter, sans-serif, "Helvetica Neue", Arial;
        }

        button {
            cursor: pointer;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            overflow-x: hidden;
        }

        .top-title {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            min-height: 86px;
            margin-bottom: 10px;
            text-align: center;
            border-bottom: 1px solid var(--line);
        }

        .top-title-main {
            font-family: "Michroma", sans-serif;
            color: var(--accent);
            font-size: clamp(14px, 2vh, 20px);
            letter-spacing: 0.22em;
            line-height: 1.4;
        }

        .top-title-sub {
            color: var(--muted);
            font-size: 11px;
            letter-spacing: 0.14em;
            line-height: 1.6;
        }

        .search-area {
            display: grid;
            grid-template-columns:
                minmax(0, 1fr)
                minmax(0, 1fr)
                minmax(0, 1fr)
                30px;
            gap: 10px;
            align-items: center;
            padding: 18px 0 18px;
            background: transparent;
            margin-bottom: 10px;
            border-bottom: 1px solid var(--line);
        }

        .search-input {
            width: 100%;
            min-width: 0;
            height: 30px;
            padding: 0 14px;
            border: 1px solid var(--line-strong);
            border-radius: 999px;
            background: var(--control-bg);
            color: var(--text);
            font-size: 13px;
            outline: none;
            box-sizing: border-box;
        }

        .search-input::placeholder {
            color: var(--muted);
            letter-spacing: 0.08em;
        }

        .search-input:focus {
            border-color: var(--accent);
            color: var(--text);
        }

        .search-btn {
            width: 30px;
            height: 30px;
            min-width: 30px;
            min-height: 30px;
            padding: 0;
            border: 1px solid var(--line-strong);
            border-radius: 50%;
            background: var(--control-bg);
            color: var(--muted);
            display: flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
        }

        .search-btn:hover {
            color: var(--accent);
            border-color: var(--accent);
        }

        .search-btn svg {
            width: 16px;
            height: 16px;
            display: block;
            fill: currentColor;
            pointer-events: none;
        }

        #status {
            text-align: center;
            color: var(--muted);
            font-size: 12px;
            letter-spacing: 0.12em;
            margin: 18px 0;
        }

        .hidden {
            display: none;
        }

        .itunes-stage {
            width: 100%;
            overflow: hidden;
            border-top: 1px solid var(--line);
        }

        .itunes-slider {
            width: 200%;
            display: grid;
            grid-template-columns: 50% 50%;
            transform: translateX(0%);
            transition: transform 0.65s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .itunes-slider.show-album {
            transform: translateX(-50%);
        }

        .itunes-page {
            min-width: 0;
            padding: 0 0 40px;
        }

        .itunes-search-page,
        .itunes-album-page {
            width: 100%;
        }

        .itunes-search-page {
            display: grid;
            grid-template-rows: 44px minmax(0, 1fr);
            min-height: 0;
        }

        .itunes-tabbar {
            height: 44px;
            min-height: 44px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            align-items: center;
            border-bottom: 1px solid var(--line);
            background: var(--bg);
            position: sticky;
            top: 0;
            z-index: 5;
        }

        .itunes-tab-btn {
            width: 100%;
            height: 44px;
            min-width: 0;
            min-height: 44px;
            padding: 0;
            border: none;
            border-radius: 0;
            background: transparent;
            color: var(--muted);
            font-size: 12px;
            font-weight: 800;
            letter-spacing: 0.16em;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .itunes-tab-btn:hover {
            color: var(--accent);
        }

        .itunes-tab-btn.active {
            color: var(--accent);
        }

        .itunes-tab-btn.active::after {
            content: "";
            position: absolute;
            left: 18%;
            right: 18%;
            bottom: 0;
            height: 2px;
            background: var(--accent);
        }

        .itunes-tab-panel {
            display: none;
            min-height: 0;
        }

        .itunes-tab-panel.active {
            display: block;
        }

        .itunes-list {
            border-bottom: 1px solid var(--line);
        }

        .itunes-row {
            min-height: 62px;
            display: grid;
            grid-template-columns: 52px minmax(0, 1fr) 82px;
            gap: 10px;
            align-items: center;
            border-bottom: 1px solid var(--line);
            background: var(--bg);
            color: var(--text);
            cursor: pointer;
        }

        .itunes-row:last-child {
            border-bottom: none;
        }

        .itunes-row:hover {
            background: var(--soft-accent);
        }

        .itunes-thumb {
            width: 44px;
            height: 44px;
            border: 1px solid var(--line-strong);
            border-radius: 8px;
            background: var(--control-bg);
            overflow: hidden;
        }

        .itunes-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .itunes-main {
            min-width: 0;
        }

        .itunes-artist {
            color: var(--muted);
            font-size: 11px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 4px;
        }

        .itunes-title {
            color: var(--text);
            font-size: 13px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .itunes-meta,
        .itunes-time {
            color: var(--accent);
            font-family: monospace;
            font-size: 11px;
            text-align: right;
            white-space: nowrap;
        }

        .itunes-breadcrumb {
            height: 44px;
            display: grid;
            grid-template-columns: 72px minmax(0, 1fr);
            gap: 10px;
            align-items: center;
            border-bottom: 1px solid var(--line);
            background: var(--bg);
        }

        .itunes-back-btn {
            width: 72px;
            height: 28px;
            padding: 0;
            border: 1px solid var(--line-strong);
            border-radius: 999px;
            background: transparent;
            color: var(--muted);
            font-size: 11px;
            letter-spacing: 0.08em;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .itunes-back-btn:hover {
            color: var(--accent);
            border-color: var(--accent);
        }

        .itunes-breadcrumb-title {
            color: var(--accent);
            font-size: 12px;
            font-weight: 800;
            letter-spacing: 0.12em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .empty-list {
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--muted);
            font-size: 12px;
            letter-spacing: 0.12em;
            text-align: center;
            line-height: 1.8;
        }

        .itunes-title-loading {
            min-height: 160px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
        }

        .homiez-loading-spinner {
            width: 34px;
            height: 34px;
            border: 2px solid rgba(255, 255, 255, 0.16);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: homiezSpin 0.95s linear infinite;
        }

        @keyframes homiezSpin {
            to {
                transform: rotate(360deg);
            }
        }


        /* -------------------- Transparent Scrollbar -------------------- */

        html,
        body {
            scrollbar-width: thin;
            scrollbar-color: transparent transparent;
        }

        html::-webkit-scrollbar,
        body::-webkit-scrollbar {
            width: 8px;
            height: 8px;
            background: transparent;
        }

        html::-webkit-scrollbar-track,
        body::-webkit-scrollbar-track {
            background: transparent;
        }

        html::-webkit-scrollbar-thumb,
        body::-webkit-scrollbar-thumb {
            background: transparent;
            border: none;
        }

        html::-webkit-scrollbar-corner,
        body::-webkit-scrollbar-corner {
            background: transparent;
        }

        @media (max-width: 640px) {
            body {
                padding: 14px;
            }

            .top-title {
                min-height: 76px;
            }

            .top-title-main {
                font-size: 13px;
                letter-spacing: 0.16em;
            }

            .top-title-sub {
                font-size: 10px;
                letter-spacing: 0.1em;
            }

            .search-area {
                grid-template-columns: minmax(0, 1fr) 30px;
                grid-template-rows: 30px 30px 30px;
            }

            #artistInput {
                grid-column: 1 / 2;
                grid-row: 1 / 2;
            }

            #albumInput {
                grid-column: 1 / 2;
                grid-row: 2 / 3;
            }

            #titleInput {
                grid-column: 1 / 2;
                grid-row: 3 / 4;
            }

            #searchBtn {
                grid-column: 2 / 3;
                grid-row: 1 / 4;
                align-self: center;
            }

            .itunes-row {
                grid-template-columns: 50px minmax(0, 1fr) 64px;
                gap: 10px;
            }

            .itunes-thumb {
                width: 42px;
                height: 42px;
            }

            .itunes-artist {
                font-size: 10px;
            }

            .itunes-title {
                font-size: 12px;
            }

            .itunes-meta,
            .itunes-time {
                font-size: 10px;
            }

            .itunes-tab-btn {
                font-size: 11px;
                letter-spacing: 0.12em;
            }
        }
    </style>
</head>

<body>

<div class="container">
    <div class="top-title">
        <div class="top-title-main">Z-BUDDY HOMIEZ</div>
        <div class="top-title-sub">MUSIC SEARCH</div>
    </div>

    <div class="search-area">
        <input
            type="text"
            id="artistInput"
            class="search-input"
            placeholder="ARTIST"
            spellcheck="false"
        >

        <input
            type="text"
            id="albumInput"
            class="search-input"
            placeholder="ALBUM"
            spellcheck="false"
        >

        <input
            type="text"
            id="titleInput"
            class="search-input"
            placeholder="TITLE"
            spellcheck="false"
        >

        <button
            id="searchBtn"
            class="search-btn"
            type="button"
            aria-label="Search"
            title="Search"
        >
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M9.5 4.5a5 5 0 0 1 3.95 8.06l5 5a1 1 0 0 1-1.41 1.41l-5-5A5 5 0 1 1 9.5 4.5m0 2a3 3 0 1 0 0 6a3 3 0 0 0 0-6Z"></path>
            </svg>
        </button>
    </div>

    <div id="status" class="hidden">検索中...</div>

    <section id="itunesStage" class="itunes-stage">
        <div id="itunesSlider" class="itunes-slider">

            <section class="itunes-page itunes-search-page">

                <div class="itunes-tabbar">
                    <button
                        id="albumTabBtn"
                        class="itunes-tab-btn active"
                        type="button"
                        data-tab="album"
                    >
                        ALBUM
                    </button>

                    <button
                        id="singleTabBtn"
                        class="itunes-tab-btn"
                        type="button"
                        data-tab="single"
                    >
                        SINGLE
                    </button>
                </div>

                <div id="albumPanel" class="itunes-tab-panel active">
                    <div id="albumResults" class="itunes-list">
                        <div class="empty-list">SEARCH FIRST</div>
                    </div>
                </div>

                <div id="singlePanel" class="itunes-tab-panel">
                    <div id="singleResults" class="itunes-list">
                        <div class="empty-list">SEARCH FIRST</div>
                    </div>
                </div>

            </section>

            <section class="itunes-page itunes-album-page">
                <div class="itunes-breadcrumb">
                    <button id="albumBackBtn" class="itunes-back-btn" type="button">
                        / BACK
                    </button>

                    <div id="albumBreadcrumbTitle" class="itunes-breadcrumb-title">
                        ALBUM
                    </div>
                </div>

                <div id="albumTrackResults" class="itunes-list">
                    <div class="empty-list">SELECT ALBUM</div>
                </div>
            </section>

        </div>
    </section>
</div>

<script>
    const artistInput = document.getElementById('artistInput');
    const albumInput = document.getElementById('albumInput');
    const titleInput = document.getElementById('titleInput');
    const searchBtn = document.getElementById('searchBtn');
    const statusDiv = document.getElementById('status');

    const itunesStage = document.getElementById('itunesStage');
    const itunesSlider = document.getElementById('itunesSlider');
    const albumResults = document.getElementById('albumResults');
    const singleResults = document.getElementById('singleResults');
    const albumTrackResults = document.getElementById('albumTrackResults');
    const albumBackBtn = document.getElementById('albumBackBtn');
    const albumBreadcrumbTitle = document.getElementById('albumBreadcrumbTitle');

    const albumTabBtn = document.getElementById('albumTabBtn');
    const singleTabBtn = document.getElementById('singleTabBtn');
    const albumPanel = document.getElementById('albumPanel');
    const singlePanel = document.getElementById('singlePanel');

    let currentAlbumForSelection = null;

    searchBtn.addEventListener('click', searchMusic);

    window.addEventListener('message', (event) => {
        const data = event.data || {};

        if (data.type !== 'ZBUDDY_ITUNES_SEARCH') {
            return;
        }

        const artist = String(data.artist || '').trim();
        const album = String(data.album || '').trim();
        const title = String(data.title || data.query || '').trim();

        if (artistInput) {
            artistInput.value = artist;
        }

        if (albumInput) {
            albumInput.value = album;
        }

        if (titleInput) {
            titleInput.value = title;
        }

        searchMusic();
    });

    albumTabBtn.addEventListener('click', () => {
        switchTab('album');
    });

    singleTabBtn.addEventListener('click', () => {
        switchTab('single');
    });

    albumBackBtn.addEventListener('click', () => {
        itunesSlider.classList.remove('show-album');

        requestAnimationFrame(() => {
            itunesStage.scrollIntoView({
                block: 'start',
                behavior: 'auto'
            });
        });
    });

    async function searchMusic() {
        const artistQuery = artistInput.value.trim();
        const albumQuery = albumInput.value.trim();
        const titleQuery = titleInput.value.trim();

        if (!artistQuery && !albumQuery && !titleQuery) return;

        itunesSlider.classList.remove('show-album');
        switchTab('album');

        albumResults.innerHTML = '<div class="empty-list">LOADING ALBUM...</div>';
        singleResults.innerHTML = '<div class="empty-list">WAITING SINGLE...</div>';
        albumTrackResults.innerHTML = '<div class="empty-list">SELECT ALBUM</div>';
        albumBreadcrumbTitle.textContent = 'ALBUM';

        statusDiv.textContent = '検索中...';
        statusDiv.classList.remove('hidden');

        const regions = ['jp', 'us', 'kr', 'hk'];

        try {
            const albumSearch = buildAlbumSearch(artistQuery, albumQuery, titleQuery);
            const singleSearch = buildSingleSearch(artistQuery, albumQuery, titleQuery);

            const albumPromises = regions.map(region =>
                fetch(buildSearchUrl({
                    term: albumSearch.term,
                    country: region,
                    entity: 'album',
                    attribute: albumSearch.attribute
                }))
                    .then(res => res.json())
                    .then(data => ({ region, data }))
            );

            const albumArrays = await Promise.all(albumPromises);
            const albumMap = new Map();

            albumArrays.forEach(({ region, data }) => {
                data.results.forEach(album => {
                    if (!albumMap.has(album.collectionId)) {
                        albumMap.set(album.collectionId, {
                            ...album,
                            sourceRegion: region
                        });
                    }
                });
            });

            const filteredAlbums = filterAlbums(
                Array.from(albumMap.values()),
                artistQuery,
                albumQuery,
                titleQuery
            );

            displayAlbums(filteredAlbums);

            singleResults.innerHTML = '<div class="empty-list">LOADING SINGLE...</div>';

            const singlePromises = regions.map(region =>
                fetch(buildSearchUrl({
                    term: singleSearch.term,
                    country: region,
                    entity: 'song',
                    attribute: singleSearch.attribute
                }))
                    .then(res => res.json())
                    .then(data => ({ region, data }))
            );

            const singleArrays = await Promise.all(singlePromises);
            const singleMap = new Map();

            singleArrays.forEach(({ region, data }) => {
                data.results.forEach(track => {
                    if (!singleMap.has(track.trackId)) {
                        singleMap.set(track.trackId, {
                            ...track,
                            sourceRegion: region
                        });
                    }
                });
            });

            const filteredSingles = filterSingles(
                Array.from(singleMap.values()),
                artistQuery,
                albumQuery,
                titleQuery
            );

            displaySingles(filteredSingles);

            statusDiv.classList.add('hidden');
        } catch (e) {
            console.error(e);
            statusDiv.textContent = 'エラーが発生しました。';
            statusDiv.classList.remove('hidden');
            albumResults.innerHTML = '<div class="empty-list">ALBUM ERROR</div>';
            singleResults.innerHTML = '<div class="empty-list">SINGLE ERROR</div>';
        }
    }

    function buildSearchUrl({ term, country, entity, attribute }) {
        const params = new URLSearchParams({
            term: term,
            country: country,
            media: 'music',
            entity: entity,
            limit: '200'
        });

        if (attribute) {
            params.set('attribute', attribute);
        }

        return `https://itunes.apple.com/search?${params.toString()}`;
    }

    function buildAlbumSearch(artistQuery, albumQuery, titleQuery) {
        if (albumQuery) {
            return {
                term: albumQuery,
                attribute: 'albumTerm'
            };
        }

        if (artistQuery) {
            return {
                term: artistQuery,
                attribute: 'artistTerm'
            };
        }

        return {
            term: titleQuery,
            attribute: 'albumTerm'
        };
    }

    function buildSingleSearch(artistQuery, albumQuery, titleQuery) {
        if (titleQuery) {
            return {
                term: titleQuery,
                attribute: 'songTerm'
            };
        }

        if (albumQuery) {
            return {
                term: albumQuery,
                attribute: 'albumTerm'
            };
        }

        return {
            term: artistQuery,
            attribute: 'artistTerm'
        };
    }

    function switchTab(tabName) {
        const isAlbum = tabName === 'album';

        albumTabBtn.classList.toggle('active', isAlbum);
        singleTabBtn.classList.toggle('active', !isAlbum);

        albumPanel.classList.toggle('active', isAlbum);
        singlePanel.classList.toggle('active', !isAlbum);
    }

    function filterAlbums(albums, artistQuery, albumQuery, titleQuery) {
        return albums.filter(album => {
            const artistOk = !artistQuery || containsText(album.artistName, artistQuery);
            const albumOk = !albumQuery || containsText(album.collectionName, albumQuery);
            const titleOk = albumQuery || !titleQuery || containsText(album.collectionName, titleQuery);

            return artistOk && albumOk && titleOk;
        });
    }

    function filterSingles(tracks, artistQuery, albumQuery, titleQuery) {
        return tracks.filter(track => {
            const artistOk = !artistQuery || containsText(track.artistName, artistQuery);
            const albumOk = !albumQuery || containsText(track.collectionName, albumQuery);
            const titleOk = !titleQuery || containsText(track.trackName, titleQuery);

            return artistOk && albumOk && titleOk;
        });
    }

    function containsText(source, keyword) {
        if (!keyword) return true;
        if (!source) return false;

        return normalizeText(source).includes(normalizeText(keyword));
    }

    function normalizeText(value) {
        return String(value)
            .toLowerCase()
            .normalize('NFKC')
            .replace(/\s+/g, '');
    }

    function displayAlbums(albums) {
        albumResults.innerHTML = '';

        if (!albums || albums.length === 0) {
            albumResults.innerHTML = '<div class="empty-list">NO ALBUM FOUND</div>';
            return;
        }

        albums.forEach(album => {
            const trackCount = album.trackCount || '--';

            const row = document.createElement('div');
            row.className = 'itunes-row album-row';
            row.innerHTML = `
                <div class="itunes-thumb">
                    <img src="${album.artworkUrl100 || ''}" alt="album">
                </div>
                <div class="itunes-main">
                    <div class="itunes-artist">${escapeHtml(album.artistName || '')}</div>
                    <div class="itunes-title">${escapeHtml(album.collectionName || '')}</div>
                </div>
                <div class="itunes-meta">(${trackCount}) TRACK</div>
            `;

            row.onclick = () => openAlbum(album);
            albumResults.appendChild(row);
        });
    }

    function sendItunesSelectionToParent(payload) {
        const data = {
            type: 'ZBUDDY_ITUNES_SELECT',
            artist: payload.artist || '',
            album: payload.album || '',
            title: payload.title || '',
            kind: payload.kind || 'track'
        };

        window.parent.postMessage(data, '*');
    }

    function displaySingles(tracks) {
        singleResults.innerHTML = '';

        if (!tracks || tracks.length === 0) {
            singleResults.innerHTML = '<div class="empty-list">NO SINGLE FOUND</div>';
            return;
        }

        tracks.forEach(track => {
            const timeStr = formatMillis(track.trackTimeMillis);

            const row = document.createElement('div');
            row.className = 'itunes-row single-row';
            row.innerHTML = `
                <div class="itunes-thumb">
                    <img src="${track.artworkUrl100 || ''}" alt="single">
                </div>
                <div class="itunes-main">
                    <div class="itunes-artist">${escapeHtml(track.artistName || '')}</div>
                    <div class="itunes-title">${escapeHtml(track.trackName || '')}</div>
                </div>
                <div class="itunes-time">${timeStr}</div>
            `;

            row.onclick = () => {
                sendItunesSelectionToParent({
                    artist: track.artistName || '',
                    album: track.collectionName || '',
                    title: track.trackName || '',
                    kind: 'single'
                });
            };

            singleResults.appendChild(row);
        });
    }

    async function openAlbum(album) {
        currentAlbumForSelection = album;
        albumBreadcrumbTitle.textContent = album.collectionName || 'ALBUM';

        albumTrackResults.innerHTML = `
            <div class="itunes-title-loading">
                <div class="homiez-loading-spinner"></div>
            </div>
        `;

        itunesSlider.classList.add('show-album');
        resetToAlbumTop();

        try {
            const lookupRegions = getLookupRegions(album);
            const tracks = await fetchAlbumTracksWithFallback(album, lookupRegions);

            displayAlbumTracks(tracks);
        } catch (e) {
            console.error(e);
            albumTrackResults.innerHTML = '<div class="empty-list">ALBUM TRACK ERROR</div>';
        }
    }

    function getLookupRegions(album) {
        const candidates = [
            album.sourceRegion,
            'us',
            'jp',
            'kr',
            'hk'
        ];

        return candidates.filter((region, index, self) =>
            region && self.indexOf(region) === index
        );
    }

    async function fetchAlbumTracksWithFallback(album, lookupRegions) {
        for (const region of lookupRegions) {
            try {
                const lookupUrl = `https://itunes.apple.com/lookup?id=${album.collectionId}&country=${region}&media=music&entity=song&limit=200`;
                const response = await fetch(lookupUrl);
                const data = await response.json();
                const tracks = extractTracksFromLookup(data);

                console.log('LOOKUP REGION:', region);
                console.log('LOOKUP RESULT COUNT:', data.resultCount);
                console.log('LOOKUP TRACK COUNT:', tracks.length);

                if (tracks.length > 0) {
                    return tracks;
                }
            } catch (e) {
                console.warn('LOOKUP FAILED:', region, e);
            }
        }

        return [];
    }

    function extractTracksFromLookup(data) {
        if (!data || !Array.isArray(data.results)) return [];

        const strictTracks = data.results.filter(item =>
            item.wrapperType === 'track' &&
            item.kind === 'song' &&
            item.trackName
        );

        if (strictTracks.length > 0) {
            return strictTracks;
        }

        return data.results.filter(item =>
            item.wrapperType === 'track' &&
            item.trackName
        );
    }

    function displayAlbumTracks(tracks) {
        albumTrackResults.innerHTML = '';

        if (!tracks || tracks.length === 0) {
            albumTrackResults.innerHTML = '<div class="empty-list">NO TRACK FOUND</div>';
            return;
        }

        tracks.forEach(track => {
            const timeStr = formatMillis(track.trackTimeMillis);

            const row = document.createElement('div');
            row.className = 'itunes-row album-track-row';
            row.innerHTML = `
                <div class="itunes-thumb">
                    <img src="${track.artworkUrl100 || ''}" alt="track">
                </div>
                <div class="itunes-main">
                    <div class="itunes-artist">${escapeHtml(track.artistName || '')}</div>
                    <div class="itunes-title">${escapeHtml(track.trackName || '')}</div>
                </div>
                <div class="itunes-time">${timeStr}</div>
            `;

            row.onclick = () => {
                sendItunesSelectionToParent({
                    artist: track.artistName || (currentAlbumForSelection ? currentAlbumForSelection.artistName : ''),
                    album: track.collectionName || (currentAlbumForSelection ? currentAlbumForSelection.collectionName : ''),
                    title: track.trackName || '',
                    kind: 'album-track'
                });
            };

            albumTrackResults.appendChild(row);
        });
    }

    function resetToAlbumTop() {
        albumTrackResults.scrollTop = 0;

        requestAnimationFrame(() => {
            itunesStage.scrollIntoView({
                block: 'start',
                behavior: 'auto'
            });
        });
    }

    function formatMillis(value) {
        if (!value || Number.isNaN(Number(value))) return '--:--';

        const minutes = Math.floor(value / 60000);
        const seconds = Math.floor((value % 60000) / 1000);

        return `${minutes}:${String(seconds).padStart(2, '0')}`;
    }

    function escapeHtml(value) {
        return String(value)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#039;');
    }
</script>
