<!doctype html>
<html lang="en-US">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YouTube Route</title>
  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      background: #000000;
      color: #00f3ff;
      overflow: hidden;
      font-family: Inter, sans-serif, "Helvetica Neue", Arial;
    }

    #youtubeRoutePlayerHost {
      position: fixed;
      left: -9999px;
      top: -9999px;
      width: 320px;
      height: 180px;
      overflow: hidden;
      opacity: 0;
      pointer-events: none;
    }

    #youtubeRoutePlayer {
      width: 320px;
      height: 180px;
    }
  </style>
</head>
<body>
<div id="youtubeRoutePlayerHost">
  <div id="youtubeRoutePlayer"></div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
  const YOUTUBE_MUSIC_NEGATIVE_QUERY_WORDS = [
    "MV",
    "PV",
    "official",
    "LIVE",
    "公式",
    "ライブ",
    "ミュージックビデオ",
    "プロモーションビデオ",
    "music video",
    "official video",
    "dance",
    "choreography",
    "reaction",
    "teaser",
    "trailer",
    "interview",
    "shorts",
    "karaoke",
    "カラオケ"
  ];

  const YOUTUBE_MUSIC_REJECT_PATTERNS = [
    /\bofficial\s+(music\s+)?video\b/i,
    /\bofficial\s+mv\b/i,
    /\bmusic\s+video\b/i,
    /\bm\/v\b/i,
    /\bmv\b/i,
    /\bpv\b/i,
    /\bpromotional\s+video\b/i,
    /ミュージックビデオ/i,
    /プロモーションビデオ/i,
    /\blive\b/i,
    /ライブ/i,
    /\bperformance\b/i,
    /パフォーマンス/i,
    /\bdance\s+practice\b/i,
    /\bdance\b/i,
    /踊ってみた/i,
    /\bchoreography\b/i,
    /\breaction\b/i,
    /リアクション/i,
    /\btrailer\b/i,
    /\bteaser\b/i,
    /\binterview\b/i,
    /インタビュー/i,
    /\bshorts\b/i,
    /#shorts/i,
    /\bkaraoke\b/i,
    /カラオケ/i,
    /\blyrics?\s+video\b/i,
    /歌詞動画/i
  ];

  const YOUTUBE_MUSIC_PREFERRED_PATTERNS = [
    /\btopic\b/i,
    /provided\s+to\s+youtube/i,
    /auto-?generated/i,
    /\baudio\b/i,
    /\bofficial\s+audio\b/i,
    /\balbum\b/i,
    /\bsingle\b/i,
    /\brelease\b/i
  ];

  let youtubeRoutePlayer = null;
  let youtubeRoutePlayerReady = false;
  let youtubeRoutePendingVideoId = "";

  window.onYouTubeIframeAPIReady = function () {
    youtubeRoutePlayer = new YT.Player("youtubeRoutePlayer", {
      width: "320",
      height: "180",
      videoId: "",
      playerVars: {
        autoplay: 0,
        controls: 0,
        playsinline: 1,
        rel: 0,
        modestbranding: 1,
      },
      events: {
        onReady: function () {
          youtubeRoutePlayerReady = true;

          if (youtubeRoutePendingVideoId) {
            playYoutubeRouteVideo(youtubeRoutePendingVideoId);
            youtubeRoutePendingVideoId = "";
          }
        },
        onStateChange: function (event) {
          sendYoutubePlayerState(event.data);
        },
      },
    });
  };

  window.addEventListener("message", async (event) => {
    const data = event.data || {};

    if (data.type === "ZBUDDY_YOUTUBE_PLAY") {
      playYoutubeRouteVideo(data.videoId);
      return;
    }

    if (data.type === "ZBUDDY_YOUTUBE_PAUSE") {
      pauseYoutubeRouteVideo();
      return;
    }

    if (data.type === "ZBUDDY_YOUTUBE_STOP") {
      stopYoutubeRouteVideo();
      return;
    }

    if (data.type === "ZBUDDY_YOUTUBE_GET_PROGRESS") {
      sendYoutubeProgress();
      return;
    }

    if (data.type === "ZBUDDY_YOUTUBE_SEEK") {
      seekYoutubeRouteVideo(data.seconds);
      return;
    }

    if (data.type === "ZBUDDY_YOUTUBE_PLAYLIST_ITEMS") {
      await handleYoutubePlaylistItems(data);
      return;
    }

    if (data.type === "ZBUDDY_YOUTUBE_SEARCH") {
      await handleYoutubeSearch(data);
      return;
    }
  });

  async function handleYoutubeSearch(data) {
    const requestId = String(data.requestId || "");
    const apiKey = String(data.apiKey || "").trim();
    const query = String(data.query || "").trim();
    const pageToken = String(data.pageToken || "").trim();
    const requestedMaxResults = Math.max(1, Math.min(Number(data.maxResults || 25), 50));
    const apiMaxResults = 50;

    if (!apiKey) {
      sendYoutubeError("API KEY REQUIRED", requestId);
      return;
    }

    if (!query) {
      sendYoutubeError("QUERY REQUIRED", requestId);
      return;
    }

    try {
      const topicQuery = buildYoutubeTopicQuery(query);

      let searchUrl =
        "https://www.googleapis.com/youtube/v3/search" +
        "?part=snippet" +
        "&maxResults=" + encodeURIComponent(String(apiMaxResults)) +
        "&q=" + encodeURIComponent(topicQuery) +
        "&key=" + encodeURIComponent(apiKey);

      if (pageToken) {
        searchUrl += "&pageToken=" + encodeURIComponent(pageToken);
      }

      const searchResponse = await fetch(searchUrl);

      if (!searchResponse.ok) {
        sendYoutubeError("YOUTUBE SEARCH FAILED", requestId);
        return;
      }

      const searchJson = await searchResponse.json();
      const rawItems = Array.isArray(searchJson.items) ? searchJson.items : [];
      const filteredItems = filterYoutubeMusicSearchItems(rawItems);

      const videoIds = filteredItems
        .filter((item) => item && item.id && item.id.kind === "youtube#video")
        .map((item) => item.id.videoId)
        .filter(Boolean);

      const durationMap = await fetchYoutubeDurations(apiKey, videoIds);

      const results = filteredItems
        .map((item) => normalizeYoutubeSearchItem(item, durationMap))
        .filter(Boolean)
        .slice(0, requestedMaxResults);

      window.parent.postMessage(
        {
          type: "ZBUDDY_YOUTUBE_RESULTS",
          requestId: requestId,
          query: query,
          topicQuery: topicQuery,
          nextPageToken: searchJson.nextPageToken || "",
          results: results,
        },
        "*",
      );
    } catch (error) {
      console.error(error);
      sendYoutubeError("YOUTUBE ROUTE ERROR", requestId);
    }
  }

  function filterYoutubeMusicSearchItems(rawItems) {
    const items = Array.isArray(rawItems) ? rawItems : [];

    const playlistItems = items
      .filter((item) => item && item.id && item.id.kind === "youtube#playlist")
      .filter((item) => !isRejectedYoutubeMusicItem(item))
      .sort((a, b) => getYoutubeMusicScore(b) - getYoutubeMusicScore(a));

    const preferredVideoItems = items
      .filter((item) => item && item.id && item.id.kind === "youtube#video")
      .filter((item) => !isRejectedYoutubeMusicItem(item))
      .filter((item) => isPreferredYoutubeMusicItem(item))
      .sort((a, b) => getYoutubeMusicScore(b) - getYoutubeMusicScore(a));

    return [
      ...playlistItems,
      ...preferredVideoItems,
    ];
  }

  function normalizeYoutubeSearchItem(item, durationMap) {
    const id = item && item.id ? item.id : {};
    const snippet = item && item.snippet ? item.snippet : {};
    const thumbnails = snippet.thumbnails || {};
    const medium = thumbnails.medium || thumbnails.default || {};
    const kind = id.kind || "";

    if (kind === "youtube#playlist") {
      const playlistId = id.playlistId || "";

      if (!playlistId) {
        return null;
      }

      return {
        itemKind: "youtube#playlist",
        itemType: "ALBUM",
        source: "youtubeAlbum",
        playlistId: playlistId,
        videoId: "",
        title: cleanYoutubeTopicTitle(decodeHtml(snippet.title || "")),
        artist: cleanYoutubeTopicTitle(decodeHtml(snippet.channelTitle || "YouTube")),
        channelTitle: cleanYoutubeTopicTitle(decodeHtml(snippet.channelTitle || "YouTube")),
        thumbnailUrl: medium.url || "",
        duration: "--:--",
        url: "https://www.youtube.com/playlist?list=" + playlistId,
      };
    }

    if (kind === "youtube#video") {
      const videoId = id.videoId || "";

      if (!videoId) {
        return null;
      }

      return {
        itemKind: "youtube#video",
        itemType: "SONG",
        source: "youtubeMusic",
        playlistId: "",
        videoId: videoId,
        title: cleanYoutubeTopicTitle(decodeHtml(snippet.title || "")),
        artist: cleanYoutubeTopicTitle(decodeHtml(snippet.channelTitle || "YouTube")),
        channelTitle: cleanYoutubeTopicTitle(decodeHtml(snippet.channelTitle || "YouTube")),
        thumbnailUrl: medium.url || "",
        duration: durationMap[videoId] || "--:--",
        url: "https://www.youtube.com/watch?v=" + videoId,
      };
    }

    return null;
  }

  async function handleYoutubePlaylistItems(data) {
    const requestId = String(data.requestId || "").trim();
    const apiKey = String(data.apiKey || "").trim();
    const playlistId = String(data.playlistId || "").trim();
    const pageToken = String(data.pageToken || "").trim();

    if (!apiKey) {
      sendYoutubeError("API KEY REQUIRED", requestId);
      return;
    }

    if (!playlistId) {
      sendYoutubeError("PLAYLIST ID REQUIRED", requestId);
      return;
    }

    try {
      let url =
        "https://www.googleapis.com/youtube/v3/playlistItems" +
        "?part=snippet" +
        "&maxResults=50" +
        "&playlistId=" + encodeURIComponent(playlistId) +
        "&key=" + encodeURIComponent(apiKey);

      if (pageToken) {
        url += "&pageToken=" + encodeURIComponent(pageToken);
      }

      const response = await fetch(url);

      if (!response.ok) {
        sendYoutubeError("YOUTUBE PLAYLIST FAILED", requestId);
        return;
      }

      const json = await response.json();
      const rawItems = Array.isArray(json.items) ? json.items : [];
      const items = rawItems.filter((item) => !isRejectedYoutubePlaylistItem(item));

      const videoIds = items
        .map((item) => {
          const snippet = item && item.snippet ? item.snippet : {};
          const resourceId = snippet.resourceId || {};
          return resourceId.videoId || "";
        })
        .filter(Boolean);

      const durationMap = await fetchYoutubeDurations(apiKey, videoIds);

      const results = items
        .map((item) => {
          const snippet = item && item.snippet ? item.snippet : {};
          const resourceId = snippet.resourceId || {};
          const videoId = resourceId.videoId || "";
          const thumbnails = snippet.thumbnails || {};
          const medium = thumbnails.medium || thumbnails.default || {};

          if (!videoId) {
            return null;
          }

          return {
            itemKind: "youtube#video",
            itemType: "SONG",
            source: "youtubeMusic",
            playlistId: playlistId,
            videoId: videoId,
            title: cleanYoutubeTopicTitle(decodeHtml(snippet.title || "")),
            artist: cleanYoutubeTopicTitle(
              decodeHtml(snippet.videoOwnerChannelTitle || snippet.channelTitle || "YouTube"),
            ),
            channelTitle: cleanYoutubeTopicTitle(
              decodeHtml(snippet.videoOwnerChannelTitle || snippet.channelTitle || "YouTube"),
            ),
            thumbnailUrl: medium.url || "",
            duration: durationMap[videoId] || "--:--",
            url: "https://www.youtube.com/watch?v=" + videoId,
          };
        })
        .filter(Boolean);

      window.parent.postMessage(
        {
          type: "ZBUDDY_YOUTUBE_PLAYLIST_RESULTS",
          requestId: requestId,
          playlistId: playlistId,
          nextPageToken: json.nextPageToken || "",
          results: results,
        },
        "*",
      );
    } catch (error) {
      console.error(error);
      sendYoutubeError("YOUTUBE PLAYLIST ERROR", requestId);
    }
  }

  function playYoutubeRouteVideo(videoId) {
    const id = String(videoId || "").trim();

    if (!id) {
      return;
    }

    if (!youtubeRoutePlayerReady || !youtubeRoutePlayer) {
      youtubeRoutePendingVideoId = id;
      return;
    }

    try {
      youtubeRoutePlayer.loadVideoById(id);
      sendYoutubePlayerState(1);
    } catch (error) {
      console.error(error);
      sendYoutubeError("YOUTUBE PLAY ERROR", "");
    }
  }

  function pauseYoutubeRouteVideo() {
    if (!youtubeRoutePlayerReady || !youtubeRoutePlayer) {
      sendYoutubePlayerState(2);
      return;
    }

    try {
      youtubeRoutePlayer.pauseVideo();
      sendYoutubePlayerState(2);
    } catch (error) {
      console.error(error);
      sendYoutubeError("YOUTUBE PAUSE ERROR", "");
    }
  }

  function stopYoutubeRouteVideo() {
    youtubeRoutePendingVideoId = "";

    if (!youtubeRoutePlayerReady || !youtubeRoutePlayer) {
      sendYoutubePlayerState(0);
      return;
    }

    try {
      youtubeRoutePlayer.stopVideo();
      sendYoutubePlayerState(0);
    } catch (error) {
      console.warn(error);
      sendYoutubePlayerState(0);
    }
  }

  function seekYoutubeRouteVideo(seconds) {
    const target = Number(seconds || 0);

    if (
      youtubeRoutePlayerReady &&
      youtubeRoutePlayer &&
      Number.isFinite(target) &&
      target >= 0
    ) {
      try {
        youtubeRoutePlayer.seekTo(target, true);
        sendYoutubeProgress();
      } catch (error) {
        console.error(error);
        sendYoutubeError("YOUTUBE SEEK ERROR", "");
      }
    }
  }

  function sendYoutubePlayerState(state) {
    window.parent.postMessage(
      {
        type: "ZBUDDY_YOUTUBE_PLAYER_STATE",
        state: state,
        isPlaying: state === 1 || state === 3,
      },
      "*",
    );

    sendYoutubeProgress();
  }

  function sendYoutubeProgress() {
    if (!youtubeRoutePlayerReady || !youtubeRoutePlayer) {
      window.parent.postMessage(
        {
          type: "ZBUDDY_YOUTUBE_PROGRESS",
          currentTime: 0,
          duration: 0,
        },
        "*",
      );
      return;
    }

    let currentTime = 0;
    let duration = 0;

    try {
      currentTime =
        typeof youtubeRoutePlayer.getCurrentTime === "function"
          ? youtubeRoutePlayer.getCurrentTime()
          : 0;

      duration =
        typeof youtubeRoutePlayer.getDuration === "function"
          ? youtubeRoutePlayer.getDuration()
          : 0;
    } catch (error) {
      currentTime = 0;
      duration = 0;
    }

    window.parent.postMessage(
      {
        type: "ZBUDDY_YOUTUBE_PROGRESS",
        currentTime: currentTime,
        duration: duration,
      },
      "*",
    );
  }

  function buildYoutubeTopicQuery(query) {
    const raw = String(query || "").trim();

    if (!raw) {
      return "";
    }

    const topicQuery = /\b-\s*topic\b/i.test(raw)
      ? raw
      : raw + " - Topic";

    const negativeQuery = YOUTUBE_MUSIC_NEGATIVE_QUERY_WORDS
      .map((word) => "-" + String(word || "").trim())
      .filter((word) => word.length > 1)
      .join(" ");

    return (topicQuery + " " + negativeQuery).trim();
  }

  function isRejectedYoutubeMusicItem(item) {
    const snippet = item && item.snippet ? item.snippet : {};
    const text = [
      snippet.title || "",
      snippet.channelTitle || "",
      snippet.description || ""
    ].join(" ");

    return YOUTUBE_MUSIC_REJECT_PATTERNS.some((pattern) => pattern.test(text));
  }

  function isRejectedYoutubePlaylistItem(item) {
    const snippet = item && item.snippet ? item.snippet : {};
    const statusText = String(snippet.title || "").toLowerCase();

    if (
      statusText === "deleted video" ||
      statusText === "private video"
    ) {
      return true;
    }

    return isRejectedYoutubeMusicItem(item);
  }

  function isPreferredYoutubeMusicItem(item) {
    const snippet = item && item.snippet ? item.snippet : {};
    const text = [
      snippet.title || "",
      snippet.channelTitle || "",
      snippet.description || ""
    ].join(" ");

    if (isYoutubeTopicChannel(item)) {
      return true;
    }

    return YOUTUBE_MUSIC_PREFERRED_PATTERNS.some((pattern) => pattern.test(text));
  }

  function isYoutubeTopicChannel(item) {
    const snippet = item && item.snippet ? item.snippet : {};
    const channelTitle = String(snippet.channelTitle || "");

    return /\btopic\b/i.test(channelTitle);
  }

  function getYoutubeMusicScore(item) {
    const id = item && item.id ? item.id : {};
    const snippet = item && item.snippet ? item.snippet : {};
    const text = [
      snippet.title || "",
      snippet.channelTitle || "",
      snippet.description || ""
    ].join(" ");

    let score = 0;

    if (id.kind === "youtube#playlist") {
      score += 100;
    }

    if (isYoutubeTopicChannel(item)) {
      score += 60;
    }

    if (/\btopic\b/i.test(text)) {
      score += 40;
    }

    if (/\balbum\b/i.test(text)) {
      score += 30;
    }

    if (/provided\s+to\s+youtube/i.test(text)) {
      score += 25;
    }

    if (/auto-?generated/i.test(text)) {
      score += 20;
    }

    if (/\baudio\b/i.test(text)) {
      score += 15;
    }

    return score;
  }

  async function fetchYoutubeDurations(apiKey, videoIds) {
    const ids = Array.isArray(videoIds) ? videoIds.filter(Boolean) : [];

    if (ids.length === 0) {
      return {};
    }

    try {
      const url =
        "https://www.googleapis.com/youtube/v3/videos" +
        "?part=contentDetails" +
        "&id=" + encodeURIComponent(ids.join(",")) +
        "&key=" + encodeURIComponent(apiKey);

      const response = await fetch(url);

      if (!response.ok) {
        return {};
      }

      const json = await response.json();
      const map = {};

      (json.items || []).forEach((item) => {
        const id = item && item.id ? item.id : "";
        const duration = item && item.contentDetails ? item.contentDetails.duration : "";

        if (id) {
          map[id] = formatYoutubeDuration(duration);
        }
      });

      return map;
    } catch (error) {
      return {};
    }
  }

  function formatYoutubeDuration(value) {
    const raw = String(value || "");
    const match = raw.match(/^PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?$/);

    if (!match) {
      return "--:--";
    }

    const hours = Number(match[1] || 0);
    const minutes = Number(match[2] || 0);
    const seconds = Number(match[3] || 0);

    if (hours > 0) {
      return [
        String(hours),
        String(minutes).padStart(2, "0"),
        String(seconds).padStart(2, "0"),
      ].join(":");
    }

    return [
      String(minutes),
      String(seconds).padStart(2, "0"),
    ].join(":");
  }

  function cleanYoutubeTopicTitle(value) {
    return String(value || "")
      .replace(/\s+-\s+Topic$/i, "")
      .trim();
  }

  function decodeHtml(value) {
    const textarea = document.createElement("textarea");
    textarea.innerHTML = String(value || "");
    return textarea.value;
  }

  function sendYoutubeError(message, requestId) {
    window.parent.postMessage(
      {
        type: "ZBUDDY_YOUTUBE_ERROR",
        requestId: requestId || "",
        message: message,
      },
      "*",
    );
  }
</script>
</body>
</html>
